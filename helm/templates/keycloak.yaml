{{- if .Values.keycloak.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gigachad-grc.fullname" . }}-keycloak
  labels:
    {{- include "gigachad-grc.labels" . | nindent 4 }}
    {{- include "gigachad-grc.selectorLabels" (dict "context" . "component" "keycloak") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "gigachad-grc.selectorLabels" (dict "context" . "component" "keycloak") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "gigachad-grc.labels" . | nindent 8 }}
        {{- include "gigachad-grc.selectorLabels" (dict "context" . "component" "keycloak") | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "gigachad-grc.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
      containers:
        - name: keycloak
          image: "{{ .Values.keycloak.image.repository }}:{{ .Values.keycloak.image.tag }}"
          imagePullPolicy: {{ .Values.keycloak.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
          args:
            - start-dev
            - --import-realm
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              value: "jdbc:postgresql://{{ include "gigachad-grc.postgresql.host" . }}:5432/{{ .Values.postgresql.auth.keycloakDatabase }}"
            - name: KC_DB_USERNAME
              value: {{ .Values.postgresql.auth.username | quote }}
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "gigachad-grc.secretName" . }}
                  key: postgresql-password
            - name: KC_HOSTNAME_STRICT
              value: "false"
            - name: KC_HOSTNAME_STRICT_HTTPS
              value: "false"
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KEYCLOAK_ADMIN
              value: {{ .Values.keycloak.auth.adminUser | quote }}
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "gigachad-grc.secretName" . }}
                  key: keycloak-admin-password
          readinessProbe:
            httpGet:
              path: /realms/master
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /realms/master
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.keycloak.resources | nindent 12 }}
      {{- with .Values.keycloak.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.keycloak.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.keycloak.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "gigachad-grc.fullname" . }}-keycloak
  labels:
    {{- include "gigachad-grc.labels" . | nindent 4 }}
    {{- include "gigachad-grc.selectorLabels" (dict "context" . "component" "keycloak") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "gigachad-grc.selectorLabels" (dict "context" . "component" "keycloak") | nindent 4 }}
{{- end }}
