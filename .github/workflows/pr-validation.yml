name: PR Validation

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

permissions:
  contents: read

jobs:
  # Frontend validation
  frontend:
    name: Frontend Validation
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install all dependencies
        run: npm ci

      - name: Fix rollup optional dep for Linux
        run: npm install @rollup/rollup-linux-x64-gnu --save-optional
        working-directory: frontend
        continue-on-error: true

      - name: TypeScript compilation check
        run: npx tsc --noEmit
        working-directory: frontend

      - name: ESLint validation
        run: npm run lint
        working-directory: frontend

      - name: Run unit tests
        run: npm test -- --run --reporter=verbose
        working-directory: frontend

      - name: Build check
        run: npm run build
        working-directory: frontend

  # Backend services validation
  backend:
    name: Backend Validation
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [controls, frameworks, policies, tprm, trust, audit]

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install all dependencies
        run: npm ci

      # Lifecycle scripts are disabled globally via .npmrc as a supply-chain
      # defense. The Prisma client is required for the per-service TS
      # compilation below, so generate it explicitly here.
      - name: Generate Prisma client
        run: npm run db:generate

      - name: Build shared module
        run: npm run build --workspace=@gigachad-grc/shared

      - name: TypeScript compilation check
        run: npx tsc --noEmit
        working-directory: services/${{ matrix.service }}
        continue-on-error: true # Some services have pre-existing type issues

      - name: ESLint validation
        run: npm run lint --if-present
        working-directory: services/${{ matrix.service }}
        continue-on-error: true # Some services have ESLint config issues

      - name: Run unit tests
        run: npm test --if-present
        working-directory: services/${{ matrix.service }}
        continue-on-error: true # Tests may not be fully implemented yet

  # Security scanning - BLOCKING: PRs cannot merge with security issues
  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (BLOCKING, production deps)
        # Blocking gate scoped to production dependencies — what actually ships
        # in the deployed containers. Dev-only build/test tooling is audited
        # below as advisory (non-blocking).
        run: npm audit --omit=dev --audit-level=high

      - name: Run npm audit on dev dependencies (advisory)
        continue-on-error: true
        run: npm audit --audit-level=high

      - name: Verify npm package signatures (BLOCKING)
        # Checks sigstore attestations for installed packages. Catches
        # package takeovers where a malicious version is published without
        # a valid signature from the maintainer's published key. Skips
        # gracefully for packages that have not yet enabled attestations.
        run: npm audit signatures

      - name: Run Trivy vulnerability scanner (BLOCKING)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          scanners: 'vuln'
          severity: 'CRITICAL,HIGH'
          exit-code: '1' # BLOCKING: Fail on HIGH/CRITICAL vulnerabilities
          format: 'table'
          ignore-unfixed: true # Only fail on vulnerabilities with available fixes
          cache: false # Fresh DB each run; a stale cached DB causes false positives

  # Docker build check
  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [controls, frameworks, policies, tprm, trust, audit]

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: false
          tags: grc-${{ matrix.service }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
        env:
          DOCKER_BUILDKIT: 1
        continue-on-error: true # Some services have TypeScript build issues

  # E2E: tenant-isolation + RBAC (BLOCKING)
  # Brings up the full dev compose stack, seeds demo data, and runs only the
  # two new Playwright specs that exercise cross-tenant data leakage and
  # role-based access control. The broader 253-test suite is intentionally
  # not run here — it remains local-dev-only for now.
  e2e-tenant-rbac:
    name: E2E Tenant & RBAC Tests
    runs-on: ubuntu-latest
    needs: [frontend]
    timeout-minutes: 30

    env:
      # Throwaway secrets for the ephemeral CI stack. These are NOT real
      # credentials — they only need to satisfy docker-compose's required-var
      # checks (${VAR:?...}). Postgres / Redis / RustFS / Keycloak / Grafana
      # come up fresh and are torn down at the end of the job.
      POSTGRES_USER: grc
      POSTGRES_PASSWORD: ci-postgres-password
      POSTGRES_DB: gigachad_grc
      REDIS_PASSWORD: ci-redis-password
      MINIO_ROOT_USER: rustfsadmin
      MINIO_ROOT_PASSWORD: ci-minio-password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ci-keycloak-password
      GRAFANA_ADMIN_USER: admin
      GRAFANA_ADMIN_PASSWORD: ci-grafana-password
      # CI-only fixture. The controls service requires length >= 32 and passes
      # this through scrypt as a passphrase, so any non-empty 32+ char string
      # works. Avoid hex/random-looking strings here — gitleaks' encryption-key
      # rule matches /ENCRYPTION_KEY['"=:\s]+['"][0-9a-f]{32,}['"]/ and would
      # flag this even though it's an obvious fixture.
      ENCRYPTION_KEY: 'ci-fixture-encryption-key-not-a-real-secret-padding-padding'
      PHISHING_TRACKING_SECRET: ci-phishing-tracking-secret
      # Playwright targets the nginx frontend container exposed on :3000.
      E2E_BASE_URL: http://localhost:3000

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Bring up dev stack
        # Plain `up -d` (no --wait). The polling step below handles
        # readiness gating with a 5 min budget. We don't use --wait
        # because the frontend's nginx healthcheck has a tight retry
        # budget (5s start period + 3 retries at 30s interval) and the
        # first build of all 7 images on a cold runner can exceed it.
        # --wait then exits non-zero before the poll has a chance to
        # confirm actual HTTP readiness.
        run: docker compose up -d

      - name: Poll backend + frontend readiness (5 min max)
        run: |
          set -e
          deadline=$(( $(date +%s) + 300 ))
          ready_controls=0
          ready_frontend=0
          ready_frameworks=0
          while [ "$(date +%s)" -lt "$deadline" ]; do
            frontend_code="ready"
            if [ "$ready_controls" -eq 0 ] && \
               curl -sf -o /dev/null http://127.0.0.1:3001/health; then
              echo "controls service ready"
              ready_controls=1
            fi
            if [ "$ready_frontend" -eq 0 ]; then
              # Frontend can legitimately return non-2xx while booting auth/routes.
              # Treat any HTTP response as ready; only reject connection refused.
              frontend_code="$(curl -s -o /dev/null -w '%{http_code}' --max-time 5 http://127.0.0.1:3000/ || true)"
              if [ "$frontend_code" != "000" ]; then
                echo "frontend ready (http $frontend_code)"
                ready_frontend=1
              fi
            fi
            if [ "$ready_frameworks" -eq 0 ] && \
               curl -s -o /dev/null --max-time 5 http://127.0.0.1:3002/ \
               && [ "$(curl -s -o /dev/null -w '%{http_code}' --max-time 5 http://127.0.0.1:3002/)" != "000" ]; then
              # `/` returns 4xx on frameworks (no public root route) but that's
              # fine — we only want to confirm the HTTP server is responding.
              # `%{http_code} != 000` rejects connection-refused (curl prints 000).
              echo "frameworks service ready"
              ready_frameworks=1
            fi
            if [ "$ready_controls" -eq 1 ] && [ "$ready_frontend" -eq 1 ] && [ "$ready_frameworks" -eq 1 ]; then
              echo "All endpoints healthy"
              exit 0
            fi
            echo "wait: controls=$ready_controls frontend=$ready_frontend frameworks=$ready_frameworks frontend_http=$frontend_code"
            sleep 5
          done
          echo "::error::Stack did not become ready within 5 minutes"
          docker compose ps
          docker compose logs --tail=200
          exit 1

      - name: Seed demo data
        run: |
          curl -fsS -X POST http://127.0.0.1:3001/api/seed/load-demo \
            -H 'x-user-id: 8f88a42b-e799-455c-b68a-308d7d2e9aa4' \
            -H 'x-org-id: 8924f0c1-7bb1-4be8-84ee-ad8725c712bf'

      - name: Install Playwright + Chromium
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Run tenant-isolation + RBAC + mapping-flow + mapping-history + mapping-suggest + mapping-derived-views + mapping-import-export specs
        run: npx playwright test e2e/tenant-isolation.spec.ts e2e/rbac.spec.ts e2e/mapping-flow.spec.ts e2e/mapping-history.spec.ts e2e/mapping-suggest.spec.ts e2e/mapping-derived-views.spec.ts e2e/mapping-import-export.spec.ts --reporter=line
        working-directory: frontend

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7

      - name: Upload Playwright test-results
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-test-results
          path: frontend/test-results
          retention-days: 7

      - name: Tear down dev stack
        if: always()
        # -v drops the named volumes too so the runner is clean even on
        # retry / re-run. The compose stack is ephemeral; nothing here is
        # worth preserving.
        run: docker compose down -v --remove-orphans

  # E2E quality checks (accessibility + visual regression).
  # REPORT-ONLY: this job emits artifacts (axe-core results, Playwright
  # report, visual snapshots) but does NOT block merge. The
  # `continue-on-error: true` at the job level and the deliberate
  # omission from the `status` rollup below both encode this. Flip
  # `continue-on-error` to `false` and add `e2e-quality-checks` to the
  # status `needs` list once baselines stabilize.
  e2e-quality-checks:
    name: E2E Quality Checks (a11y + visual, report-only)
    runs-on: ubuntu-latest
    needs: [frontend]
    timeout-minutes: 30
    continue-on-error: true

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies (skip lifecycle scripts)
        run: npm ci --ignore-scripts

      - name: Write throwaway .env for compose
        # docker-compose.yml uses `${VAR:?...}` on ~10 required vars
        # (postgres, redis, keycloak admin, MinIO/RustFS, encryption
        # key, phishing tracking secret). These are throwaway values
        # for the ephemeral CI stack — the entire stack is torn down
        # at the end of the job and contains only seeded demo data.
        run: |
          cat > .env <<'ENVEOF'
          POSTGRES_USER=grc
          POSTGRES_PASSWORD=ci-throwaway-pg-pw
          POSTGRES_DB=gigachad_grc
          REDIS_PASSWORD=ci-throwaway-redis-pw
          KEYCLOAK_ADMIN=admin
          KEYCLOAK_ADMIN_PASSWORD=ci-throwaway-kc-admin-pw
          MINIO_ROOT_USER=rustfsadmin
          MINIO_ROOT_PASSWORD=ci-throwaway-minio-pw
          ENCRYPTION_KEY=ci-throwaway-encryption-key-aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          PHISHING_TRACKING_SECRET=ci-throwaway-phishing-secret-bbbbbbbbbbbb
          GRAFANA_ADMIN_USER=admin
          GRAFANA_ADMIN_PASSWORD=ci-throwaway-grafana-pw
          VITE_ENABLE_DEV_AUTH=true
          ALLOW_DEV_AUTH=true
          ENVEOF

      - name: Bring up dev stack
        # Plain `up -d` (no --wait). The polling step below handles the
        # readiness gate. The frontend nginx healthcheck has a tight
        # retry budget on a cold runner; --wait would exit non-zero
        # before our poll has a chance to confirm HTTP readiness.
        run: docker compose up -d

      - name: Wait for stack health
        run: |
          set -e
          deadline=$(( $(date +%s) + 300 ))
          ready_api=0
          ready_frontend=0
          while [ "$(date +%s)" -lt "$deadline" ]; do
            frontend_code="ready"
            if [ "$ready_api" -eq 0 ] && \
               curl -sf -o /dev/null http://127.0.0.1:3001/health; then
              echo "api ready"
              ready_api=1
            fi
            if [ "$ready_frontend" -eq 0 ]; then
              # Frontend can return non-2xx from / on boot; only 000 means not reachable.
              frontend_code="$(curl -s -o /dev/null -w '%{http_code}' --max-time 5 http://127.0.0.1:3000/ || true)"
              if [ "$frontend_code" != "000" ]; then
                echo "frontend ready (http $frontend_code)"
                ready_frontend=1
              fi
            fi
            if [ "$ready_api" -eq 1 ] && [ "$ready_frontend" -eq 1 ]; then
              echo "Stack ready (api+frontend)"
              exit 0
            fi
            echo "wait: api=$ready_api frontend=$ready_frontend frontend_http=$frontend_code"
            sleep 5
          done
          echo "::error::Stack did not become healthy within 5 minutes"
          docker compose ps
          docker compose logs --tail=200
          exit 1

      - name: Seed demo data
        run: |
          curl -fsS -X POST http://127.0.0.1:3001/api/seed/load-demo \
            -H 'x-user-id: 8f88a42b-e799-455c-b68a-308d7d2e9aa4' \
            -H 'x-org-id: 8924f0c1-7bb1-4be8-84ee-ad8725c712bf' \
            --max-time 120 || echo "Seed call returned non-zero (continuing)"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Run accessibility (axe-core) scans (report-only)
        run: npx playwright test e2e/a11y.spec.ts --reporter=line
        working-directory: frontend
        continue-on-error: true

      - name: Run visual regression suite (report-only)
        run: npx playwright test e2e/visual.spec.ts --grep @visual --reporter=line
        working-directory: frontend
        continue-on-error: true

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: e2e-quality-playwright-report
          path: frontend/playwright-report
          retention-days: 14

      - name: Upload Playwright test-results (videos, traces, diffs)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: e2e-quality-test-results
          path: frontend/test-results
          retention-days: 14

      - name: Upload visual snapshots (baselines + actuals)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: e2e-quality-visual-snapshots
          path: frontend/e2e/__snapshots__
          retention-days: 14

      - name: Tear down dev stack
        if: always()
        run: docker compose down -v

  # Final status check
  status:
    name: Validation Status
    runs-on: ubuntu-latest
    needs: [frontend, backend, security, docker, e2e-tenant-rbac]
    if: always()
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Check all jobs status
        run: |
          if [ "${{ needs.frontend.result }}" == "failure" ] || \
             [ "${{ needs.backend.result }}" == "failure" ] || \
             [ "${{ needs.security.result }}" == "failure" ] || \
             [ "${{ needs.e2e-tenant-rbac.result }}" == "failure" ]; then
            echo "Required checks failed"
            exit 1
          fi
          echo "All required checks passed (frontend, backend, security, e2e-tenant-rbac)"
